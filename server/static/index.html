<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title id="title">TAssistant</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div id="preset-container" class="preset-container"></div>
    <div class="container-column">
        <div id="world-container" class="container world-container">
            <div class="container-title">World</div>
            <div class="world-val-grid">
                <div class="world-cell">
                    <span class="world-label">Online</span>
                    <span id="world-val-online" class="world-value">-</span>
                </div>
                <div class="world-cell">
                    <span class="world-label">Ping</span>
                    <span id="world-val-rtt" class="world-value">-</span>
                </div>
                <div class="world-cell">
                    <span class="world-label">Packet Loss</span>
                    <span id="world-val-packetloss" class="world-value">-</span>
                </div>
            </div>
        </div>
        <div id="exp-container" class="container exp-container">
            <div class="container-title">Experience Tracker</div>
            <div class="exp-val-grid">
                <div class="exp-cell">
                    <span class="exp-label">Level</span>
                    <span id="exp-val-level" class="exp-value">-</span>
                </div>
                <div class="exp-cell">
                    <span class="exp-label">Experience</span>
                    <span id="exp-val-total" class="exp-value">-</span>
                </div>
                <div class="exp-cell">
                    <span class="exp-label">Remaining</span>
                    <span id="exp-val-remaining" class="exp-value">-</span>
                </div>
                <div class="exp-cell">
                    <span class="exp-label">Session Exp/h</span>
                    <span id="exp-val-session-rate" class="exp-value">-</span>
                </div>
                <div class="exp-cell">
                    <span class="exp-label">Session Exp</span>
                    <span id="exp-val-session-delta" class="exp-value">-</span>
                </div>
                <div class="exp-cell">
                    <span class="exp-label">Session Duration</span>
                    <span id="exp-val-session-duration" class="exp-value">-</span>
                </div>
            </div>
            <div class="exp-btn-grid">
                <button id="exp-btn-run" class="btn exp-btn">Start</button>
                <button id="exp-btn-pause" class="btn exp-btn">Pause</button>
                <button id="exp-btn-reset" class="btn exp-btn">Reset</button>
            </div>
        </div>
    </div>
    <div class="container-column">
        <div id="acc-container" class="container acc-container">
            <div class="container-title">Account Switcher</div>
            <div id="acc-list" class="acc-list"></div>
        </div>
    </div>
    <div id="toast" class="toast"></div>
    <script src="/main.js"></script>
</body>

</html>
