<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title id="title">Tibiantis Assistant</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div id="version-check" class="toast-top"></div>
    <div class="container">
        <h1>Account Switcher</h1>
        <div id="list"></div>
    </div>
    <div id="exp-container" class="container">
        <h1>Experience Tracker</h1>
        <div class="exp-val-grid">
            <div class="exp-cell">
                <span class="exp-label">Level</span>
                <span id="exp-val-level" class="exp-value">-</span>
            </div>
            <div class="exp-cell">
                <span class="exp-label">Experience</span>
                <span id="exp-val-total" class="exp-value">-</span>
            </div>
            <div class="exp-cell">
                <span class="exp-label">Remaining</span>
                <span id="exp-val-remaining" class="exp-value">-</span>
            </div>
            <div class="exp-cell">
                <span class="exp-label">Session Exp/h</span>
                <span id="exp-val-session-rate" class="exp-value">-</span>
            </div>
            <div class="exp-cell">
                <span class="exp-label">Session Exp</span>
                <span id="exp-val-session-delta" class="exp-value">-</span>
            </div>
            <div class="exp-cell">
                <span class="exp-label">Session Duration</span>
                <span id="exp-val-session-duration" class="exp-value">-</span>
            </div>
        </div>
        <div class="exp-btn-grid">
            <button id="exp-btn-run" class="btn btn-exp">Start</button>
            <button id="exp-btn-pause" class="btn btn-exp">Pause</button>
            <button id="exp-btn-reset" class="btn btn-exp">Reset</button>
        </div>
    </div>
    <div id="toast" class="toast"></div>
    <script src="/main.js"></script>
</body>

</html>
